  <style>
    /* =============================================
       PAGE DEVENIR PARTENAIRE
       ============================================= */

    .partner-layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* --- Hero --- */
    .partner-hero {
      background: linear-gradient(135deg, rgba(245,158,11,0.12) 0%, rgba(245,158,11,0.03) 100%);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .partner-badge-top {
      display: inline-block;
      background: var(--primary, #f59e0b);
      color: #000;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      margin-bottom: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .partner-hero-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }
    .partner-hero-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }

    /* Compteur */
    .partner-counter-box {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 1rem;
      padding: 1.5rem 2rem;
      max-width: 440px;
      margin: 0 auto;
    }
    .partner-counter-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .partner-counter-numbers {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .partner-counter-digit {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--primary, #f59e0b);
      line-height: 1;
    }
    .partner-counter-sep {
      font-size: 2rem;
      color: var(--text-muted);
    }
    .partner-counter-total {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .partner-counter-bar-track {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .partner-counter-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary, #f59e0b), #fbbf24);
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .partner-counter-note {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* --- Features grid --- */
    .partner-features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .partner-feature-card {
      background: var(--card-bg, rgba(255,255,255,0.03));
      border: 1px solid var(--border-color, rgba(255,255,255,0.07));
      border-radius: 1rem;
      padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .partner-feature-card:hover {
      border-color: rgba(245,158,11,0.4);
      transform: translateY(-2px);
    }
    .partner-feature-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .partner-feature-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .partner-feature-card p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* --- Pricing --- */
    .partner-pricing-section { text-align: center; }
    .partner-pricing-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }
    .partner-pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .partner-pricing-card {
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      text-align: center;
      border: 1px solid var(--border-color, rgba(255,255,255,0.07));
    }
    .partner-pricing-free {
      background: linear-gradient(145deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04));
      border-color: rgba(245,158,11,0.35);
    }
    .partner-pricing-paid {
      background: rgba(255,255,255,0.02);
    }
    .partner-pricing-badge {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary, #f59e0b);
      margin-bottom: 1rem;
    }
    .partner-pricing-price {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .partner-pricing-period {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .partner-pricing-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-align: left;
    }
    .partner-pricing-list li {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* --- Form --- */
    .partner-form-section {
      background: var(--card-bg, rgba(255,255,255,0.03));
      border: 1px solid var(--border-color, rgba(255,255,255,0.07));
      border-radius: 1.25rem;
      padding: 2rem 2rem 2.5rem;
    }
    .partner-form-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }
    .partner-form-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }
    .partner-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 600px) {
      .partner-form-row { grid-template-columns: 1fr; }
    }
    .partner-submit-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    /* Success block */
    .partner-success-block {
      text-align: center;
      padding: 2rem;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 1rem;
      margin-top: 1.5rem;
    }
    .partner-success-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .partner-success-block h4 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #10b981;
      margin-bottom: 0.5rem;
    }
    .partner-success-block p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Onglet partenaire mis en valeur */
    .tab-btn-partner {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08)) !important;
      border: 1px solid rgba(245,158,11,0.35) !important;
      color: var(--primary, #f59e0b) !important;
      font-weight: 700 !important;
    }
    .tab-btn-partner:hover,
    .tab-btn-partner.active {
      background: var(--primary, #f59e0b) !important;
      color: #000 !important;
    }

    /* Fallback variables if vars.css is absent */
    :root {
      --text-primary: #ffffff;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --primary: #f59e0b;
    }
  </style>
</head>
